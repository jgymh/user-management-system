{% extends "base.html" %}

{% block title %}NEXUS · 身份验证{% endblock %}

{% block content %}
    <!-- 系统调试信息 - 测试账号请联系管理员获取 -->
    <div class="card login-card">
        <div class="corner-bot-left"></div>
        <h2 class="card-title">身份验证</h2>
        {% if request.args.get("msg") %}
            <div class="alert" style="background:rgba(0,240,255,0.08); color:#00f0ff; border:1px solid rgba(0,240,255,0.2);">{{ request.args.get("msg") }}</div>
        {% endif %}
        {% if error %}
            <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/login" class="form">
            <input type="hidden" name="csrf_token" value="{{ session['csrf_token'] }}">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="输入用户凭证..." required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="输入安全密钥..." required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">◈ 验证身份</button>
        </form>
        <div class="terminal-line">
            <span class="blink">▌</span> SYSTEM READY <span class="blink">▌</span>
        </div>
    </div>
{% endblock %}
