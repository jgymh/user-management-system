<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>帮助中心</title></head>
<body style="font-family:sans-serif;color:#e0e0e0;background:transparent;">
<div style="max-width:600px;margin:0 auto;">
<h2 style="color:#00f0ff;border-bottom:1px solid rgba(0,240,255,0.2);padding-bottom:12px;">📖 帮助中心</h2>
<ul style="line-height:2;font-size:15px;padding-left:20px;">
<li><strong>登录</strong> — 访问 /login，使用已注册账号登录</li>
<li><strong>注册</strong> — 访问 /register，填写信息创建新账号</li>
<li><strong>搜索</strong> — 登录后在首页搜索框输入关键词查询用户</li>
<li><strong>上传头像</strong> — 登录后访问 /upload，选择图片上传</li>
<li><strong>个人中心</strong> — 登录后访问 /profile，查看资料和充值</li>
<li><strong>充值</strong> — 在个人中心页面输入金额进行充值</li>
</ul>
<div style="margin-top:20px;padding:12px;background:rgba(0,240,255,0.05);border-radius:8px;border-left:3px solid #00f0ff;">
<p style="margin:0;font-size:13px;color:rgba(255,255,255,0.6);">💡 提示：更多功能正在开发中，敬请期待！</p>
</div>
</div>
</body>
</html>
